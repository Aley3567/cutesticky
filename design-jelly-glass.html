<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cute-sticky | Jelly Glass Pastel</title>
  <style>
    :root {
      --ink: #4c3d31;
      --ink-soft: rgba(76, 61, 49, 0.65);
      --line-soft: rgba(255, 255, 255, 0.5);
      --bg-ink: #4e3e33;
      --gel-1: #ff9a58;
      --gel-2: #ffc58d;
      --gel-3: #ffd6aa;
      --gel-4: #9ad6bf;
      --radius: 20px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      font-family: var(--font-sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 20%, var(--gel-2) 0%, var(--gel-2) 140px, transparent 260px),
        radial-gradient(circle at 84% 78%, var(--gel-4) 0%, var(--gel-4) 140px, transparent 245px),
        linear-gradient(150deg, #fff8ee 0, #ffe9cc 52%, #ffd5ba 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      mix-blend-mode: soft-light;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.22) 1px,
          transparent 1px, transparent 4px
        ),
        repeating-radial-gradient(
          circle at 0 0,
          rgba(120, 76, 43, 0.12) 0%, rgba(120, 76, 43, 0.12) 1px,
          transparent 1.3px, transparent 3px
        );
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -80px;
      pointer-events: none;
      background: repeating-linear-gradient(
        75deg,
        rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.1) 2px,
        transparent 2px, transparent 5px
      );
      opacity: 0.15;
      mix-blend-mode: color-dodge;
      animation: noiseDrift 18s linear infinite;
      z-index: 0;
    }

    @keyframes noiseDrift {
      0% { transform: translate(0, 0) scale(1.06); }
      50% { transform: translate(28px, -16px) scale(1.06); }
      100% { transform: translate(56px, -32px) scale(1.06); }
    }

    .window {
      position: relative;
      width: 320px;
      height: 420px;
      padding: 10px;
      display: grid;
      grid-template-rows: 46px 40px 1fr 38px;
      gap: 8px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.58);
      background:
        radial-gradient(circle at 14% 13%, rgba(255, 255, 255, 0.38) 0%, rgba(255, 255, 255, 0.38) 126px, transparent 188px),
        linear-gradient(172deg, rgba(255, 255, 255, 0.72), rgba(255, 231, 204, 0.18) 52%, rgba(255, 203, 167, 0.17)),
        linear-gradient(180deg, rgba(255, 244, 224, 0.86), rgba(255, 220, 186, 0.56));
      backdrop-filter: blur(24px) saturate(185%);
      -webkit-backdrop-filter: blur(24px) saturate(185%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -26px 56px rgba(255, 255, 255, 0.24),
        0 0 0 1px rgba(255, 255, 255, 0.22),
        0 20px 46px rgba(142, 87, 39, 0.23);
      overflow: hidden;
      isolation: isolate;
    }

    .window::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.74) 0%, rgba(255, 255, 255, 0.74) 16%, transparent 38%),
        radial-gradient(circle at 70% 84%, rgba(255, 255, 255, 0.24), transparent 42%),
        radial-gradient(circle at 24% 14%, rgba(255, 255, 255, 0.6), transparent 36%),
        linear-gradient(10deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
      mix-blend-mode: soft-light;
      border-radius: var(--radius);
      z-index: 0;
    }

    .window::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      border-radius: var(--radius);
      background-image:
        repeating-radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0.22) 1px, transparent 1px, transparent 3px),
        linear-gradient(118deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
      mix-blend-mode: overlay;
      z-index: 0;
    }

    .window > * {
      position: relative;
      z-index: 1;
    }

    .titlebar {
      display: grid;
      grid-template-columns: 24px 1fr auto auto;
      align-items: center;
      gap: 8px;
      border-radius: 13px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      padding: 0 7px;
      background: linear-gradient(180deg, rgba(255, 186, 120, 0.78), rgba(255, 153, 93, 0.52));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82), inset 0 -1px 0 rgba(178, 95, 38, 0.12);
    }

    .titlebar::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 13px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0));
      opacity: 0.7;
    }

    .logo {
      position: relative;
      width: 22px;
      height: 22px;
      border-radius: 8px;
      background: conic-gradient(from 150deg at 36% 32%, #ffe7c0 0%, #ffe7c0 34%, var(--gel-1) 60%, #d77121 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72), 0 2px 6px rgba(171, 82, 32, 0.24);
      overflow: hidden;
    }

    .logo::before,
    .logo::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
    }

    .logo::before {
      background: radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.82), transparent 42%);
      opacity: 0.9;
    }

    .logo::after {
      background: linear-gradient(135deg, transparent 44%, rgba(255, 255, 255, 0.24));
    }

    .brand {
      min-width: 0;
      color: #6e492a;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15px;
    }

    .jelly-btn {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: rgba(104, 66, 43, 0.95);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.18)),
        linear-gradient(170deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.18));
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.92),
        0 5px 12px rgba(171, 93, 46, 0.16),
        0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: transform 200ms cubic-bezier(.2, .9, .2, 1), box-shadow 180ms ease;
    }

    .jelly-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .jelly-btn:hover {
      transform: translateY(-1px) scale(1.08);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.94),
        0 7px 16px rgba(171, 93, 46, 0.22);
    }

    .jelly-btn:active {
      animation: jelly 320ms ease;
      transform: scale(0.95);
    }

    .jelly-btn svg {
      width: 13px;
      height: 13px;
      position: relative;
      z-index: 1;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    .tab {
      height: 28px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: #7c614f;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08px;
      cursor: default;
    }

    .tab.is-active {
      color: #543121;
      border-color: rgba(255, 255, 255, 0.82);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 238, 212, 0.66));
      box-shadow: 0 6px 12px rgba(169, 98, 44, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    .content {
      display: grid;
      gap: 8px;
      min-height: 0;
      grid-template-rows: minmax(100px, 1fr) minmax(84px, auto) minmax(58px, auto);
    }

    .card {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: linear-gradient(170deg, rgba(255, 255, 255, 0.62), rgba(255, 238, 214, 0.34));
      padding: 9px 10px 10px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(255, 255, 255, 0.35),
        0 7px 16px rgba(145, 82, 46, 0.10);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72) 8%, rgba(255, 255, 255, 0) 40%),
        repeating-radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.14) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: soft-light;
      opacity: 0.6;
      z-index: 0;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .card-head {
      margin: 0 0 8px;
      display: flex;
      justify-content: space-between;
      line-height: 1;
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 700;
    }

    .memo p {
      margin: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.66;
      letter-spacing: 0.02px;
    }

    .memo {
      min-height: 102px;
      display: grid;
      align-content: start;
    }

    .memo::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 38px;
      border-top: 1px dashed rgba(156, 102, 49, 0.18);
      border-bottom: 1px dashed rgba(156, 102, 49, 0.11);
      opacity: 0.6;
      z-index: 0;
    }

    .todo {
      min-height: 74px;
      display: grid;
      gap: 6px;
      align-content: start;
      padding-top: 2px;
    }

    .todo-item {
      height: 27px;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.24);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 9px;
      color: #5f4a3f;
      font-size: 13px;
    }

    .check {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 158, 86, 0.56);
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
      line-height: 1;
      color: #fff;
      box-sizing: border-box;
    }

    .done .check {
      border-color: transparent;
      background: linear-gradient(140deg, #ffb96b, #f17b27);
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .link-chip {
      height: 32px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      color: #6f4837;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.72), rgba(255, 239, 217, 0.42));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 4px 10px rgba(145, 82, 42, 0.09);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .theme {
      display: grid;
      place-items: center;
      margin-top: 2px;
    }

    .palette {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 6px rgba(129, 79, 40, 0.22);
    }

    .dot:nth-child(1) { background: #ff9850; }
    .dot:nth-child(2) { background: #ffd16d; }
    .dot:nth-child(3) { background: #f7b9a4; }
    .dot:nth-child(4) { background: #80dabd; }
    .dot:nth-child(5) { background: #a08dff; }
    .dot.active {
      transform: scale(1.12);
      box-shadow: 0 0 0 2px rgba(255, 182, 120, 0.34), 0 4px 8px rgba(141, 76, 36, 0.24);
    }

    @keyframes jelly {
      0% { transform: scale(1); }
      35% { transform: scale(0.95, 1.05); }
      60% { transform: scale(1.04, 0.96); }
      75% { transform: scale(0.98, 1.02); }
      100% { transform: scale(1); }
    }

    @media (max-width: 360px) {
      body { padding: 12px; }
      .window { width: min(320px, calc(100vw - 24px)); }
    }

    @media (max-height: 460px) {
      body { align-items: start; padding-top: 10px; }
      .window { transform: scale(0.96); transform-origin: top center; }
    }
  </style>
</head>
<body>
  <section class="window" aria-label="cute sticky jelly glass 预览窗口">
    <header class="titlebar">
      <span class="logo" aria-hidden="true"></span>
      <div class="brand">cute sticky</div>
      <button class="jelly-btn" type="button" aria-label="链接">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7.5 5.8h5a2.6 2.6 0 0 1 2.6 2.6v4.8" />
          <path d="M7.8 12.3 13.5 6.6a2 2 0 1 1 2.8 2.8L9.2 15.4" />
        </svg>
      </button>
      <button class="jelly-btn" type="button" aria-label="关闭">×</button>
    </header>

    <nav class="tabs" aria-label="视图切换">
      <button class="tab is-active" aria-current="page" type="button">备忘</button>
      <button class="tab" type="button">待办</button>
      <button class="tab" type="button">常用</button>
    </nav>

    <main class="content">
      <article class="card memo">
        <p class="card-head">
          <span>Memo</span>
          <span style="font-size:10px">warm glass</span>
        </p>
        <p>10:30 今日复盘：让便签像一块更厚实的果冻贴纸，轻盈、透明、有温度的边缘渐变与微小纸感，不做冷色。</p>
      </article>

      <section class="card todo">
        <p class="card-head">
          <span>Todo</span>
          <span style="font-size:10px">综合预览</span>
        </p>
        <div class="todo-item done">
          <span class="check">✓</span>
          <span>拉高玻璃边缘发光厚度</span>
        </div>
        <div class="todo-item">
          <span class="check"></span>
          <span>再看按钮层级与点击弹性反馈</span>
        </div>
      </section>

      <section class="card">
        <p class="card-head">
          <span>Link</span>
          <span style="font-size:10px">常用入口</span>
        </p>
        <div class="link-grid">
          <span class="link-chip">Docs</span>
          <span class="link-chip">Drive</span>
          <span class="link-chip">Inbox</span>
        </div>
      </section>
    </main>

    <footer class="theme">
      <div class="palette" aria-label="主题色">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </footer>
  </section>
</body>
</html>
