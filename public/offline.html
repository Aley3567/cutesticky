<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff8c55" />
    <title>Cute Sticky · 离线</title>
    <style>
      :root { color: #382f29; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #fff8f2; }
      main { width: min(78vw, 320px); padding: 28px; border-radius: 24px; background: #fffdfb; box-shadow: 0 12px 36px #5b40331f; }
      h1 { margin: 0 0 8px; color: #ff8c55; font-size: 20px; }
      p { margin: 0; color: #6f6259; font-size: 14px; line-height: 1.6; }
      button { margin-top: 18px; padding: 9px 16px; border: 0; border-radius: 12px; color: white; background: #ff8c55; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>暂时离线</h1>
      <p>应用资源尚未完整缓存。恢复网络后重新打开一次，之后便签、待办和番茄钟即可离线使用。</p>
      <button onclick="location.reload()">重新尝试</button>
    </main>
  </body>
</html>
